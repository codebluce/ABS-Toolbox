function renderFig5ECharts(monthKey) {
  const d = fig5Data[monthKey];
  const chart = echarts.init(document.getElementById('fig5_echarts'));
  if (!d || !d.points || d.points.length === 0) {
    chart.setOption({
      title: { text: '无数据', left: 'center', top: 'center', textStyle: { color: '#999', fontSize: 16 } }
    });
    return;
  }
  // 点大小:总规模映射到 80-800
  const maxSize = Math.max(...d.points.map(p => p.size), 1);
  const scatterData = d.points.map(p => ({
    value: [p.rate, d.institutions.indexOf(p.inst), p.size, p.inst, p.n],
    symbolSize: 80 + (p.size / maxSize) * 720
  }));
  const medianRate = d.points.reduce((s, p) => s + p.rate, 0) / d.points.length;
  chart.setOption({
    tooltip: {
      formatter: p => `${p.value[3]}<br/>平均利率: ${p.value[0].toFixed(3)}%<br/>总规模: ${p.value[2].toFixed(2)} 亿<br/>笔数: ${p.value[4]}`
    },
    grid: { left: 140, right: 80, top: 40, bottom: 60 },
    xAxis: {
      type: 'value', name: '平均申购利率 (%)', nameLocation: 'middle', nameGap: 30,
      nameTextStyle: { fontSize: 12, color: '#333' },
      axisLabel: { fontSize: 11, color: '#333', formatter: '{value}%' },
      splitLine: { lineStyle: { type: 'dashed', color: '#D9D9D9' } }
    },
    yAxis: {
      type: 'category', data: d.institutions,
      axisLabel: { fontSize: 11, color: '#333' },
      splitLine: { lineStyle: { type: 'dashed', color: '#D9D9D9' } }
    },
    series: [{
      type: 'scatter', data: scatterData,
      itemStyle: {
        color: function(p) {
          const v = p.value;
          // 量大价低=红,量小价高=浅灰,均衡=深灰
          const medianSize = maxSize / 2;
          if (v[2] >= medianSize && v[0] <= medianRate) return '#A6192E';
          if (v[2] < medianSize && v[0] > medianRate) return '#D9D9D9';
          return '#666';
        },
        opacity: 0.75,
        borderColor: '#333', borderWidth: 0.8
      },
      markLine: {
        symbol: 'none', silent: true,
        data: [{ xAxis: medianRate, lineStyle: { type: 'dashed', color: '#A6192E', width: 1 } }]],
        label: { formatter: '中位数 ' + medianRate.toFixed(2) + '%', color: '#A6192E', fontSize: 10 }
      }
    }]
  });
}

function renderFig5Plotly(monthKey) {
  const d = fig5DataPlotly[monthKey];
  const div = document.getElementById('fig5_plotly');
  if (!d || !d.points || d.points.length === 0) {
    Plotly.purge(div);
    div.innerHTML = '<div style="text-align:center;padding-top:200px;color:#999;font-size:16px">无数据</div>';
    return;
  }
  const maxSize = Math.max(...d.points.map(p => p.size), 1);
  const medianRate = d.points.reduce((s, p) => s + p.rate, 0) / d.points.length;
  const medianSize = maxSize / 2;
  // 点颜色:量大价低=红,量小价高=浅灰,均衡=深灰
  const colors = d.points.map(p => {
    if (p.size >= medianSize && p.rate <= medianRate) return '#A6192E';
    if (p.size < medianSize && p.rate > medianRate) return '#D9D9D9';
    return '#666';
  });
  const trace = {
    x: d.points.map(p => p.rate),
    y: d.points.map(p => p.inst),
    mode: 'markers+text',
    text: d.points.map(p => p.size.toFixed(1) + '亿'),
    textposition: 'right',
    textfont: { size: 9, color: '#333' },
    marker: {
      size: d.points.map(p => 80 + (p.size / maxSize) * 720) / 8,
      color: colors,
      opacity: 0.75,
      line: { color: '#333', width: 0.8 }
    },
    hovertemplate: '<b>%{y}</b><br>平均利率: %{x:.3f}%<br>总规模: %{customdata}亿<extra></extra>',
    customdata: d.points.map(p => p.size.toFixed(2)),
    type: 'scatter'
  };
  const layout = {
    margin: { l: 140, r: 80, t: 20, b: 60 },
    xaxis: {
      title: '平均申购利率 (%)',
      tickfont: { size: 11, color: '#333' },
      gridcolor: '#D9D9D9', griddash: 'dash',
      zeroline: false
    },
    yaxis: {
      tickfont: { size: 11, color: '#333' },
      autorange: 'reversed',
      gridcolor: '#D9D9D9', griddash: 'dash'
    },
    paper_bgcolor: '#FDFBF7',
    plot_bgcolor: '#FDFBF7',
    showlegend: false,
    shapes: [{
      type: 'line', xref: 'x', yref: 'paper',
      x0: medianRate, x1: medianRate, y0: 0, y1: 1,
      line: { color: '#A6192E', width: 1, dash: 'dash' }
    }]
  };
  Plotly.react(div, [trace], layout, { responsive: true, displayModeBar: false });
}

document.getElementById('fig5_plotly_slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.getElementById('fig5_plotly_label').textContent = fig5MonthLabelsPlotly[v];
  renderFig5Plotly(v === 0 ? 'all' : String(v));
});

renderFig5Plotly('all');
