function renderFig4ECharts(monthKey) {
  const d = fig4Data[monthKey];
  const chart = echarts.init(document.getElementById('fig4_echarts'));
  if (!d || !d.data || d.data.length === 0) {
    chart.setOption({
      title: { text: '无数据', left: 'center', top: 'center', textStyle: { color: '#999', fontSize: 16 } }
    });
    return;
  }
  // 构造热力图数据 [x, y, value]
  const heatData = [];
  let vmax = 0;
  for (let y = 0; y < d.institutions.length; y++) {
    for (let x = 0; x < d.assets.length; x++) {
      const v = d.data[y][x];
      heatData.push([x, y, v]);
      if (v > vmax) vmax = v;
    }
  }
  chart.setOption({
    tooltip: { position: 'top', formatter: p => `${d.institutions[p.value[1]]}<br/>${d.assets[p.value[0]]}<br/>${p.value[2].toFixed(2)} 亿` },
    grid: { left: 140, right: 80, top: 40, bottom: 60 },
    xAxis: { type: 'category', data: d.assets, splitArea: { show: true }, axisLabel: { fontSize: 12, color: '#333' } },
    yAxis: { type: 'category', data: d.institutions, splitArea: { show: true }, axisLabel: { fontSize: 11, color: '#333' } },
    visualMap: {
      min: 0, max: vmax || 1, calculable: true, orient: 'horizontal',
      left: 'center', bottom: 0,
      inRange: { color: ['#FDFBF7', '#A6192E'] }
    },
    series: [{
      name: '认购份额', type: 'heatmap', data: heatData,
      label: { show: true, formatter: p => p.value[2] > 0 ? p.value[2].toFixed(1) : '', fontSize: 10 },
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.3)' } }
    }]
  });
}

document.getElementById('fig4_echarts_slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.getElementById('fig4_echarts_label').textContent = fig4MonthLabels[v];
  renderFig4ECharts(v === 0 ? 'all' : String(v));
});

function renderFig4Plotly(monthKey) {
  const d = fig4DataPlotly[monthKey];
  const div = document.getElementById('fig4_plotly');
  if (!d || !d.data || d.data.length === 0) {
    Plotly.purge(div);
    div.innerHTML = '<div style="text-align:center;padding-top:200px;color:#999;font-size:16px">无数据</div>';
    return;
  }
  // Plotly heatmap: z=数据矩阵, x=资产, y=机构
  const trace = {
    z: d.data,
    x: d.assets,
    y: d.institutions,
    type: 'heatmap',
    colorscale: [[0, '#FDFBF7'], [1, '#A6192E']],
    showscale: true,
    colorbar: { title: '亿元', thickness: 15 },
    text: d.data.map(row => row.map(v => v > 0 ? v.toFixed(1) : '')),
    texttemplate: '%{text}',
    textfont: { size: 10 }
  };
  const layout = {
    margin: { l: 140, r: 80, t: 20, b: 60 },
    xaxis: { tickfont: { size: 12, color: '#333' } },
    yaxis: { tickfont: { size: 11, color: '#333' }, autorange: 'reversed' },
    paper_bgcolor: '#FDFBF7',
    plot_bgcolor: '#FDFBF7'
  };
  Plotly.react(div, [trace], layout, { responsive: true, displayModeBar: false });
}

document.getElementById('fig4_plotly_slider').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  document.getElementById('fig4_plotly_label').textContent = fig4MonthLabelsPlotly[v];
  renderFig4Plotly(v === 0 ? 'all' : String(v));
});
